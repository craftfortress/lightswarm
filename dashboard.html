<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LIGHTSWARM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; padding: 24px; }
h1 { font-size: 18px; color: #888; font-weight: 400; margin-bottom: 20px; }
h1 span { color: #4ade80; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-header h2 { font-size: 15px; font-weight: 600; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-running { background: #1a3a1a; color: #4ade80; }
.badge-done { background: #1a2a3a; color: #60a5fa; }
.badge-stopped { background: #3a1a1a; color: #f87171; }
.bar-track { background: #1a1a1a; border-radius: 4px; height: 8px; margin: 8px 0; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; background: linear-gradient(90deg, #22c55e, #4ade80); }
.stats { display: flex; gap: 16px; font-size: 12px; color: #888; }
.stats span { color: #ccc; }
.summary { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; display: flex; justify-content: space-around; text-align: center; margin-bottom: 16px; }
.summary .num { font-size: 28px; font-weight: 700; }
.summary .label { font-size: 11px; color: #666; margin-top: 4px; }
.summary .num-green { color: #4ade80; }
.summary .num-yellow { color: #facc15; }
.log { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 6px; padding: 12px; margin-top: 16px; font-size: 11px; color: #555; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
.updated { font-size: 11px; color: #333; text-align: right; margin-top: 8px; }
.stage { font-size: 11px; color: #facc15; margin-top: 4px; }

/* Expandable TODO list */
.todo-toggle { display: flex; align-items: center; gap: 6px; margin-top: 10px; cursor: pointer; user-select: none; font-size: 12px; color: #666; }
.todo-toggle:hover { color: #aaa; }
.todo-toggle .arrow { transition: transform 0.2s; display: inline-block; font-size: 10px; }
.todo-toggle .arrow.open { transform: rotate(90deg); }
.todo-body { overflow: hidden; transition: max-height 0.3s ease; max-height: 0; }
.todo-body.open { max-height: 600px; overflow-y: auto; }
.todo-inner { padding: 8px 0; }
.todo-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
.todo-item:last-child { border-bottom: none; }
.todo-check { width: 14px; height: 14px; border: 1.5px solid #444; border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.todo-item.done .todo-check { border-color: #4ade80; background: #1a3a1a; color: #4ade80; }
.todo-item.done .todo-text { color: #4ade80; text-decoration: line-through; text-decoration-color: #2a5a2a; }
.todo-item.pending .todo-check { border-color: #444; }
.todo-item.pending .todo-text { color: #888; }
.todo-section { font-size: 11px; color: #555; font-weight: 600; margin-top: 8px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<h1>LIGHT<span>SWARM</span></h1>
<div class="summary" id="summary"></div>
<div class="grid" id="grid"></div>
<div class="log" id="log"></div>
<div class="updated" id="updated"></div>

<script>
// Projects are auto-discovered from the server
let PROJECTS = [];
const expanded = {};

async function fetchText(url) {
  try { const r = await fetch(url); return r.ok ? await r.text() : ''; } catch { return ''; }
}
async function fetchJson(url) {
  try { const r = await fetch(url); return r.ok ? await r.json() : null; } catch { return null; }
}

function parseTodo(text) {
  const lines = text.split('\n');
  let done = 0, pending = 0, tasks = [];
  let currentSection = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Detect section headers (## level)
    const secMatch = line.match(/^##\s+(.+)/);
    if (secMatch && !line.match(/^###/)) {
      const sec = secMatch[1].trim();
      if (!/Current Status|Completed Today/i.test(sec)) {
        currentSection = sec;
      }
      continue;
    }

    // Detect task headers (### level)
    const hMatch = line.match(/^###\s+(.+)/);
    if (hMatch) {
      const title = hMatch[1].replace(/~~(.+?)~~/g, '$1').trim();
      const statusLine = lines[i + 2] || '';
      const isDone = /DONE|COMPLETED|\[x\]/i.test(statusLine) || /~~/.test(line);
      const isPending = /PENDING|NOT STARTED/i.test(statusLine);
      if (isDone) { done++; tasks.push({ title, done: true, section: currentSection }); }
      else if (isPending) { pending++; tasks.push({ title, done: false, section: currentSection }); }
    }

    // Also detect checkbox-style tasks
    const cbMatch = line.match(/^[-*]\s+\[([ x])\]\s+(.+)/);
    if (cbMatch) {
      const isDone = cbMatch[1] === 'x';
      if (isDone) { done++; } else { pending++; }
      tasks.push({ title: cbMatch[2], done: isDone, section: currentSection });
    }
  }
  return { done, pending, total: done + pending, tasks };
}

function parseLog(text) {
  const lines = text.trim().split('\n');
  let lastStage = '';
  let lastStatus = 'idle';
  for (let i = lines.length - 1; i >= 0; i--) {
    const l = lines[i];
    if (l.includes('Pipeline complete')) { lastStatus = 'done'; break; }
    if (l.includes('Pipeline halted')) { lastStatus = 'failed'; break; }
    if (l.includes('Running architect')) { lastStage = 'architect'; lastStatus = 'running'; break; }
    if (l.includes('Running builder')) { lastStage = 'builder'; lastStatus = 'running'; break; }
    if (l.includes('Running janitor')) { lastStage = 'janitor'; lastStatus = 'running'; break; }
    if (l.includes('architect completed')) { lastStage = 'architect done'; lastStatus = 'running'; }
    if (l.includes('builder completed')) { lastStage = 'builder done'; lastStatus = 'running'; }
    if (l.includes('janitor completed')) { lastStage = 'janitor done'; lastStatus = 'running'; }
  }
  const completedRuns = (text.match(/Pipeline complete/g) || []).length;
  return { lastStage, lastStatus, completedRuns, recentLines: lines.slice(-8) };
}

function buildTaskList(proj, tasks) {
  const isOpen = expanded[proj] || false;
  let html = '';

  let lastSection = '';
  for (const t of tasks) {
    if (t.section && t.section !== lastSection) {
      html += `<div class="todo-section">${t.section}</div>`;
      lastSection = t.section;
    }
    const cls = t.done ? 'done' : 'pending';
    const check = t.done ? '\u2713' : '';
    html += `<div class="todo-item ${cls}"><div class="todo-check">${check}</div><span class="todo-text">${t.title}</span></div>`;
  }

  return `
    <div class="todo-toggle" onclick="toggleTodo('${proj}')">
      <span class="arrow ${isOpen ? 'open' : ''}">\u25b6</span>
      TODO List (${tasks.length} items)
    </div>
    <div class="todo-body ${isOpen ? 'open' : ''}" id="todo-${proj}">
      <div class="todo-inner">${html}</div>
    </div>`;
}

function toggleTodo(proj) {
  expanded[proj] = !expanded[proj];
  const body = document.getElementById('todo-' + proj);
  const arrow = body.previousElementSibling.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

async function refresh() {
  // Auto-discover projects from server
  const discovered = await fetchJson('/projects');
  if (discovered && Array.isArray(discovered)) {
    PROJECTS = discovered;
  }

  const today = new Date().toISOString().slice(0, 10);
  let totalDone = 0, totalPending = 0, totalCycles = 0;
  let cards = '';
  let allLogs = [];

  for (const proj of PROJECTS) {
    const [todoText, logText] = await Promise.all([
      fetchText(`/todo/${proj}`),
      fetchText(`/log/${proj}?date=${today}`)
    ]);

    const todo = parseTodo(todoText);
    const log = parseLog(logText);
    const pct = todo.total > 0 ? Math.round((todo.done / todo.total) * 100) : 0;

    totalDone += todo.done;
    totalPending += todo.pending;
    totalCycles += log.completedRuns;

    const isDone = todo.pending === 0 && todo.done > 0;
    const badgeClass = isDone ? 'badge-done' : log.lastStatus === 'running' ? 'badge-running' : 'badge-stopped';
    const badgeText = isDone ? 'DONE' : log.lastStatus === 'running' ? 'RUNNING' : log.lastStatus.toUpperCase();

    cards += `
      <div class="card">
        <div class="card-header">
          <h2>${proj}</h2>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="stats">
          <div><span>${todo.done}</span>/${todo.total} tasks</div>
          <div><span>${pct}%</span></div>
          <div>cycles: <span>${log.completedRuns}</span></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        ${log.lastStatus === 'running' ? `<div class="stage">\u25b6 ${log.lastStage}</div>` : ''}
        ${buildTaskList(proj, todo.tasks)}
      </div>`;

    allLogs.push(...log.recentLines.map(l => `[${proj}] ${l}`));
  }

  document.getElementById('grid').innerHTML = cards;
  document.getElementById('summary').innerHTML = `
    <div><div class="num num-green">${totalDone}</div><div class="label">COMPLETED</div></div>
    <div><div class="num num-yellow">${totalPending}</div><div class="label">PENDING</div></div>
    <div><div class="num">${totalCycles}</div><div class="label">CYCLES</div></div>
  `;
  document.getElementById('log').textContent = allLogs.slice(-20).join('\n');
  document.getElementById('updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
